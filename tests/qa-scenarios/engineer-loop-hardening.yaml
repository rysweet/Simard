name: engineer-loop-hardening
app_type: cli
description: |
  Validates engineer loop hardening from PR #174:
  - Non-blocking bridge I/O with timeout
  - Watchdog poll loop for subprocess timeout
  - Phase tracing with duration tracking
  - Structured edit directive unescaping
agents:
  - name: cargo-test-runner
    type: cli
    command: cargo

steps:
  - action: run
    command: "cargo test --test engineer_loop -- --include-ignored engineer_loop_rejects_bare_directory_without_cargo_toml"
    timeout: 60s
  - action: expect_exit_code
    code: 0
  - action: expect_stdout
    contains: "test result: ok"

  - action: run
    command: "cargo test --test engineer_loop -- --include-ignored engineer_loop_verify_actions_match_plan"
    timeout: 60s
  - action: expect_exit_code
    code: 0
  - action: expect_stdout
    contains: "test result: ok"

  - action: run
    command: "cargo test --test engineer_loop -- --include-ignored bridge_timeout_returns_error_not_hang"
    timeout: 120s
  - action: expect_exit_code
    code: 0
  - action: expect_stdout
    contains: "test result: ok"
