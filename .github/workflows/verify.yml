name: verify

on:
  push:
  pull_request:

env:
  CARGO_BUILD_JOBS: 2

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          # GitHub runners ship with ~14GB free; lbug + amplihack-memory + simard
          # exhaust this. Remove preinstalled toolchains we don't use to free
          # ~30GB. Failures are non-fatal (some paths may be missing).
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo rm -rf /usr/local/share/boost || true
          sudo rm -rf /usr/local/share/chromium || true
          sudo rm -rf /usr/local/.ghcup || true
          sudo apt-get clean || true
          df -h /

      - name: Add swap space (4 GB)
        run: |
          # GitHub runners ship with /swapfile pre-mounted; resizing with fallocate
          # fails ("Text file busy"). Disable + remove first, then recreate.
          if sudo swapon --show | awk 'NR>1 {print $1}' | grep -qx /swapfile; then
            sudo swapoff /swapfile || true
          fi
          sudo rm -f /swapfile
          sudo fallocate -l 4G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          echo "Swap enabled: $(swapon --show)"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: simard-ci
          save-if: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install pre-commit
        run: python -m pip install --upgrade pip pre-commit

      - name: Run pre-commit stage
        run: python -m pre_commit run --all-files --show-diff-on-failure --hook-stage pre-commit

      - name: Run pre-push stage
        run: python -m pre_commit run --all-files --show-diff-on-failure --hook-stage pre-push

  install-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          # GitHub runners ship with ~14GB free; lbug + amplihack-memory + simard
          # exhaust this. Remove preinstalled toolchains we don't use to free
          # ~30GB. Failures are non-fatal (some paths may be missing).
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo rm -rf /usr/local/share/boost || true
          sudo rm -rf /usr/local/share/chromium || true
          sudo rm -rf /usr/local/.ghcup || true
          sudo apt-get clean || true
          df -h /

      - name: Add swap space (4 GB)
        run: |
          # GitHub runners ship with /swapfile pre-mounted; resizing with fallocate
          # fails ("Text file busy"). Disable + remove first, then recreate.
          if sudo swapon --show | awk 'NR>1 {print $1}' | grep -qx /swapfile; then
            sudo swapoff /swapfile || true
          fi
          sudo rm -f /swapfile
          sudo fallocate -l 4G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          echo "Swap enabled: $(swapon --show)"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: simard-ci
          save-if: true

      - name: Run install smoke test
        env:
          # Linker OOMs (signal 7) when embedding full debug info for the
          # `simard` binary under test on the 7GB GH runner. Line tables
          # keep backtraces working at a fraction of the size.
          CARGO_PROFILE_DEV_DEBUG: "line-tables-only"
          CARGO_PROFILE_DEV_INCREMENTAL: "false"
        run: cargo test --test install_smoke -- --nocapture
