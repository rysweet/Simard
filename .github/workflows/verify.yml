name: verify

on:
  push:
  pull_request:

env:
  CARGO_BUILD_JOBS: 2

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Add swap space (4 GB)
        run: |
          sudo fallocate -l 4G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          echo "Swap enabled: $(swapon --show)"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: simard-ci
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install pre-commit
        run: python -m pip install --upgrade pip pre-commit

      - name: Run pre-commit stage
        run: python -m pre_commit run --all-files --show-diff-on-failure --hook-stage pre-commit

      - name: Run pre-push stage
        run: python -m pre_commit run --all-files --show-diff-on-failure --hook-stage pre-push

  install-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Add swap space (4 GB)
        run: |
          sudo fallocate -l 4G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          echo "Swap enabled: $(swapon --show)"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: simard-ci
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Run install smoke test
        run: cargo test --test install_smoke -- --nocapture
