name: coverage

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/**"

env:
  CARGO_BUILD_JOBS: 4
  CARGO_PROFILE_DEV_DEBUG: "line-tables-only"
  CARGO_PROFILE_DEV_INCREMENTAL: "false"
  CARGO_PROFILE_TEST_DEBUG: "line-tables-only"
  CARGO_PROFILE_TEST_INCREMENTAL: "false"
  CARGO_PROFILE_DEV_BUILD_OVERRIDE_DEBUG: "false"
  CARGO_PROFILE_TEST_BUILD_OVERRIDE_DEBUG: "false"

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare Rust runner (free disk, swap, mold)
        uses: ./.github/actions/rust-runner-prep

      - name: Install Rust nightly toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: simard-coverage
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true

      - name: Run coverage
        run: |
          mkdir -p target/ci-logs
          cargo +nightly llvm-cov --workspace \
            --ignore-filename-regex 'tests?/' \
            --json \
            --summary-only \
            --output-path target/ci-logs/coverage-summary.json

      - name: Upload coverage summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary-${{ github.run_id }}-${{ github.run_attempt }}
          path: target/ci-logs/coverage-summary.json
          if-no-files-found: warn
          retention-days: 30

      - name: Post coverage comment on PR
        if: success() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'target/ci-logs/coverage-summary.json';
            if (!fs.existsSync(path)) {
              console.log('No coverage summary found, skipping comment.');
              return;
            }
            const raw = fs.readFileSync(path, 'utf8');
            const data = JSON.parse(raw);

            // Build per-module table from file-level data.
            // llvm-cov JSON schema: data[0].totals has overall stats;
            // data[0].files[] has per-file { filename, summary }.
            const totals = data.data[0].totals;
            const files = data.data[0].files || [];

            // Aggregate by top-level module (first directory under src/).
            const modules = {};
            for (const f of files) {
              const match = f.filename.match(/^src\/([^/]+)/);
              if (!match) continue;
              const mod = match[1];
              if (!modules[mod]) {
                modules[mod] = { lines: 0, covered: 0 };
              }
              const s = f.summary.lines;
              modules[mod].lines += s.count;
              modules[mod].covered += s.covered;
            }

            // Sort by name and build markdown table.
            const sorted = Object.entries(modules).sort((a, b) => a[0].localeCompare(b[0]));
            let table = '| Module | Lines | Covered | Coverage |\n';
            table += '|--------|------:|--------:|---------:|\n';
            for (const [mod, s] of sorted) {
              const pct = s.lines > 0 ? ((s.covered / s.lines) * 100).toFixed(1) : '0.0';
              table += `| \`${mod}\` | ${s.lines} | ${s.covered} | ${pct}% |\n`;
            }

            // Overall totals.
            const overallPct = totals.lines.count > 0
              ? ((totals.lines.covered / totals.lines.count) * 100).toFixed(1)
              : '0.0';
            table += `| **Total** | **${totals.lines.count}** | **${totals.lines.covered}** | **${overallPct}%** |\n`;

            const body = [
              '## 📊 Coverage Summary',
              '',
              `> Generated by \`cargo llvm-cov --workspace --summary-only\` (nightly, excluding test files)`,
              '',
              table,
              '',
              '<sub>Coverage data from CI run. Test files matching <code>tests?/</code> are excluded from line counts.</sub>',
            ].join('\n');

            // Upsert: delete previous coverage comment if present.
            const marker = '## 📊 Coverage Summary';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            for (const c of comments) {
              if (c.body && c.body.startsWith(marker)) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
