# ooda-decide.yaml ŌĆö Recipe-runner recipe for the OODA Decide brain.
#
# Replaces the direct LLM call + keyword scanning in
# RustyClawdDecideBrain (issue #2111). Parsers eliminated in issue #2144.
#
# The agent outputs the action keyword as the FIRST WORD of its response.
# The Rust shim (recipe_brain.rs) extracts the first whitespace-delimited
# token and matches it case-insensitively to the 10 known action kinds.
#
# Context vars (passed via -c):
#   goal_id, urgency, reason
#
# Output: agent stdout ŌĆö action keyword as first word, followed by rationale

name: "ooda-decide"
description: "OODA Decide brain ŌĆö routes priorities to action kinds"
version: "1.0.0"
author: "Simard"
tags: ["simard", "ooda", "decide"]

context: {}

steps:
  - id: "decide-action-kind"
    type: "agent"
    agent: "default"
    prompt: |
      # OODA Brain ŌĆö Decide Phase: Action-Kind Routing

      ## ROLE

      You are the routing brain for Simard's OODA **Decide** phase. The Orient phase
      just ranked goals; for each priority, you decide which *kind* of action the
      daemon should dispatch.
      Be conservative: prefer `advance_goal` for ordinary goal IDs unless a clear
      signal in the goal_id or reason indicates a special routing.

      ## CONTEXT

      A single priority entry produced by the Orient phase:

      ```json
      {
        "goal_id": "{{goal_id}}",
        "urgency": {{urgency}},
        "reason": "{{reason}}"
      }
      ```

      Field semantics:

      - `goal_id` ŌĆö Either a real goal slug from the active board (e.g.
        `improve-cognitive-memory-persistence`) or one of the reserved synthetic
        IDs the Orient phase emits for cross-cutting cycles:
        - `__memory__` ŌåÆ cross-session memory consolidation
        - `__improvement__` ŌåÆ run the gym-driven self-improvement loop
        - `__poll_activity__` ŌåÆ poll developer activity / ingest signals
        - `__extract_ideas__` ŌåÆ mine recent activity for new research ideas
        - `__safe_update__` ŌåÆ brain-orchestrated safe self-update (see Self-update
          awareness section below)
      - `urgency` ŌĆö Orient's score in `[0.0, 1.0]`. Already filtered to
        > `f64::EPSILON` upstream; you do not need to gate on it again.
      - `reason` ŌĆö Human-readable rationale Orient attached to the priority.

      ## OPTIONS

      Pick exactly one action kind and mention it in your response:

      - `advance_goal` ŌĆö Default for any non-reserved `goal_id`. The daemon spawns
        or re-checks the engineer assigned to this goal.
      - `consolidate_memory` ŌĆö Use for the reserved `__memory__` synthetic ID.
      - `run_improvement` ŌĆö Use for `__improvement__`.
      - `poll_developer_activity` ŌĆö Use for `__poll_activity__`.
      - `extract_ideas` ŌĆö Use for `__extract_ideas__`.
      - `safe_update` ŌĆö Use for `__safe_update__` when all four self-update
        conditions are met.
      - `research_query` ŌĆö Reserved for future use; only emit if the reason
        explicitly requests a literature/web research action.
      - `run_gym_eval`, `build_skill`, `launch_session` ŌĆö Reserved for future
        routing; do not emit unless the daemon configuration explicitly enables
        them.

      ## EXAMPLES

      Good ŌĆö reserved synthetic ID routes to its dedicated kind:

      Input: `{"goal_id": "__memory__", "urgency": 0.42, "reason": "12 unconsolidated session memories"}`
      Response: The goal_id `__memory__` is a reserved synthetic ID for memory consolidation.
      The action should be consolidate_memory.

      Good ŌĆö ordinary goal slug routes to `advance_goal`:

      Input: `{"goal_id": "ship-v1", "urgency": 0.91, "reason": "high-priority feature, no engineer assigned"}`
      Response: This is a standard development goal with a real slug.
      The action should be advance_goal.

      Good ŌĆö synthetic ID for activity polling:

      Input: `{"goal_id": "__poll_activity__", "urgency": 0.30, "reason": "no poll in last hour"}`
      Response: The `__poll_activity__` synthetic priority maps to poll_developer_activity.

      Bad ŌĆö do **not** route a real goal slug to `consolidate_memory` even if its
      description mentions memory:

      Input: `{"goal_id": "improve-cognitive-memory-persistence", "urgency": 0.7, "reason": "engineer needed for memory work"}`
      Response: Despite the word "memory" in the goal description, this is a real goal slug.
      The action should be advance_goal.

      ## Merge Authority

      Simard has a **gated** authority to squash-merge a pull request in
      `rysweet/Simard` once the PR has independently demonstrated merge-readiness.
      The library entry point is
      [`stewardship::merge_pr_if_merge_ready`](../../src/stewardship/merge_authority.rs);
      the operator-facing entry point is `simard merge-pr <PR>`.

      You may invoke `merge_pr_if_merge_ready()` (or recommend the operator run
      `simard merge-pr <PR>`) **only when all** of the following are true:

      1. The PR has been processed by the merge-ready skill
         (`~/.copilot/skills/merge-ready/SKILL.md`) ŌĆö i.e. an author or reviewer has
         actually walked the six criteria, not just claimed to.
      2. CI is **green**: `gh pr checks <PR> --repo rysweet/Simard` shows zero
         failures, zero pending, zero cancelled.
      3. The PR body contains the six evidence sections from
         `~/.copilot/skills/merge-ready/pr-description-template.md`, each populated
         with concrete artifacts (file paths, command output, commit SHAs) and not
         just template `<placeholder>` lines:
         - `### QA-team evidence`
         - `### Documentation`
         - `### Quality-audit`
         - `### CI`
         - `### PR description evidence`
         - `### Scope`
      4. `gh pr view <PR> --json mergeable` reports `MERGEABLE` (not `CONFLICTING`,
         not `UNKNOWN`).

      If any of these is missing, do **not** call the merge action. Instead, route
      the priority to `advance_goal` so the engineer can finish the work, and
      record the missing evidence in your rationale.

      This action is currently not in the brain's enumerated action set above ŌĆö
      do not emit `merge_pr` as an action keyword. Until the brain grows that action
      kind, surface the recommendation in your rationale (e.g. "PR #1500 is
      merge-ready; operator should run `simard merge-pr 1500`") and route to
      `advance_goal`.

      ## Self-update awareness

      Simard can upgrade itself in-place via `simard safe-update` (drain ŌåÆ snapshot ŌåÆ
      pre-test ŌåÆ swap ŌåÆ exec ŌåÆ validate ŌåÆ optional rollback). The orchestrator runs
      in the live binary and exec()s into the new one when ready, so deciding to
      trigger an upgrade interrupts the daemon. Be conservative.

      The daemon exposes a synthetic priority `goal_id == "__safe_update__"` for
      this purpose. **Only route to `safe_update` when ALL FOUR of the following
      hold**; otherwise route to `advance_goal` (or whatever the ordinary
      classification dictates):

      1. **Divergence Ōēź N commits** ŌĆö `git ls-remote origin main` shows the
         running binary is behind by at least `min_commits_since_build` commits
         (default `3`). Fewer commits is not worth the disruption.
      2. **No critical WIP** ŌĆö there is no in-flight engineer dispatch holding a
         PR-blocking goal. The Orient phase exposes
         `critical_wip_engineers: usize` for exactly this check; refuse if `> 0`.
      3. **Clean cycle just completed** ŌĆö the previous OODA cycle finished
         without `failure_count` increments and without `open_tracking_issue`
         actions. Do not chain a self-update onto a failing cycle.
      4. **Cooldown elapsed** ŌĆö at least `min_minutes_since_last_attempt`
         minutes (default `30`) since the last update attempt
         (`upgrade-status.json#started_at`). Prevents thrash if a previous swap
         pretest-failed or rolled back.

      Triggering doctrine summary (the four-part rule):

      ```
      divergence Ōēź N
        Ōł¦ critical_wip == 0
        Ōł¦ last_cycle_clean
        Ōł¦ minutes_since_last_attempt Ōēź M
        ŌćÆ action = safe_update
      ```

      If the daemon already observed `phase=exec_handover` in
      `~/.simard/state/upgrade-status.json` (we are *inside* the validation window),
      do not trigger another update ŌĆö return `advance_goal` and let the new
      binary's startup hook drive validation. If `phase=validate_timeout` is
      observed, the `simard rollback-watchdog` service handles rollback; the brain
      should not invoke `simard rollback` directly except when an operator escalates.

      While `~/.simard/state/draining.flag` is present, the engineer-dispatch site
      will refuse new dispatches with a `BridgeCallFailed` error. Brains that see
      this error should treat it as expected, not as a real failure.

      ## Instructions

      Output the action keyword as the very first word of your response
      (e.g. `advance_goal`, `consolidate_memory`). Follow with a brief
      rationale citing the goal_id or reason. The daemon reads only the
      first whitespace-delimited token; everything after is rationale.
    output: "decide_result"
