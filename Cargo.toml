[package]
name = "simard"
version = "0.7.0"
edition = "2024"
default-run = "simard"

[[bin]]
name = "simard-gym"
path = "src/bin/simard_gym.rs"

[dependencies]
amplihack-memory = { git = "https://github.com/rysweet/amplihack-memory-lib.git" }
rustyclawd-core = { git = "https://github.com/rysweet/RustyClawd.git" }
rustyclawd-tools = { git = "https://github.com/rysweet/RustyClawd.git" }
rusqlite = { version = "0.31", features = ["bundled"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
tokio = { version = "1", features = ["rt", "process", "io-util", "time"] }
uuid = { version = "1.18.1", features = ["v7"] }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[profile.release]
lto = "thin"
codegen-units = 1
strip = "symbols"
panic = "abort"
